# Best-practice SFT config for Llama-3, Qwen-2.5, Qwen3 (full fine-tuning).
# For LoRA, use `sft_lora_config.yaml` or add a top-level `lora:` mapping (see that file).
# full_ft.py strips `lora` before building TrainingArguments and wraps the model with PEFT.
# - Llama-3: LR 2e-6–2e-5, cosine decay to 10%, warmup 3–4%, batch 64, 1–3 epochs
# - Qwen-2.5/Qwen3: LR 1e-5–5e-5 full FT; cosine + warmup 3–10%
# - Smaller models (0.6B–1.7B): can use 2e-5–5e-5; 8B: reduce batch or use 1e-5 if OOM
run_name: sft
overwrite_output_dir: true
bf16: true
tf32: true
report_to: none
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
num_train_epochs: 3
optim: 'adamw_torch'
weight_decay: 0.1
lr_scheduler_type: 'cosine_with_min_lr'
# 2e-5 works well across Llama-3/Qwen-2.5/Qwen3; use 1e-5 or 7e-6 for stability on 8B
learning_rate: 1e-5
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.03
save_strategy: 'no'
ddp_find_unused_parameters: false
logging_steps: 1
dataloader_num_workers: 12
do_eval: false
remove_unused_columns: false
seed: 42
use_liger_kernel: true
gradient_checkpointing: true
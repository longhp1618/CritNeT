# LoRA SFT for Llama-3.x / Mistral / Qwen2–Qwen3 (CAUSAL_LM, LLaMA-style linears).
# - Learning rate: LoRA adapters are new; use ~10× full-FT LR (1e-4–3e-4). Start at 2e-4.
# - Rank r: 8 (fast / small), 16 (default), 32 (stronger expressivity, more VRAM).
# - lora_alpha: often 1–2× r (e.g. r=16, alpha=32) for stable scaling.
# - Batch: you can raise per_device batch vs full FT; keep effective batch ~same as your full run if comparing.
# - Epochs: 1–3 like full SFT; use early stopping or eval if you have a dev set.
# - Eval (e.g. SGLang): adapter-only saves need base+adapter loading; or run full_ft.py with --merge_before_save for one merged folder.
run_name: sft_lora
overwrite_output_dir: true
bf16: true
tf32: true
report_to: none
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
num_train_epochs: 3
optim: adamw_torch
weight_decay: 0.01
lr_scheduler_type: cosine_with_min_lr
learning_rate: 2.0e-4
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.03
save_strategy: "no"
ddp_find_unused_parameters: false
logging_steps: 1
dataloader_num_workers: 12
do_eval: false
remove_unused_columns: false
seed: 42
use_liger_kernel: true
gradient_checkpointing: true

lora:
  r: 64
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  # All attention + MLP projections (LLaMA / Mistral / Qwen2). Trim to q_proj,v_proj only to save VRAM.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
